# Mirror canonical → github.com/dagstack/<repo> as snapshot + per-tag
# orphan commits.
#
# Triggered on:
#   - push to main → mirror current main as a fresh snapshot of the
#     `main` branch only. Existing tags on the GitHub mirror are NOT
#     touched (each tag has its own immutable snapshot commit from
#     when it was originally pushed).
#   - push tag matching `v*` (parent) or `*/v*` (sub-module) → check
#     out THAT tag, create a snapshot orphan commit, push the tag
#     pointing at that snapshot. Other tags on the mirror are not
#     touched.
#   - workflow_dispatch → full re-mirror (pushes main + every tag,
#     each tag on its own per-tag snapshot). Use to rebuild a mirror
#     from scratch.
#
# Per-tag snapshots are critical for Go module immutability: if all
# tags share one snapshot, every new release rewrites all earlier
# tags to the current main contents — Go proxy then sees the same
# version with different content (history broken). With per-tag
# snapshots, `vX.Y.Z` always points at the contents of the canonical
# repo at the moment that tag was created.
#
# Pre-condition: GitHub repo (private or public) created manually in
# github.com/dagstack/<repo>.
#
# Secrets:
#   SUBMODULE_PAT  — Gitea token for clone (with all submodules).
#   GH_MIRROR_TOKEN — SSH ed25519 private key for git@github.com.

name: Mirror to GitHub

on:
  push:
    branches: [main]
    tags:
      - "v*"        # parent module versions
      - "*/v*"      # sub-module versions, e.g. vault/v0.4.0
  workflow_dispatch:

# Serialise mirror runs for one repo so a parallel push-main +
# push-tag (e.g. `git push origin main vault/v0.4.0` in one command)
# does not produce two clones at potentially-divergent canonical
# states. cancel-in-progress: false because cancelling an in-flight
# tag-mirror would leave the tag unpublished forever (no automatic
# retry without workflow_dispatch full re-mirror).
concurrency:
  group: mirror-${{ github.repository }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: dagstack-runner
    steps:
      - name: Resolve trigger ref + write snapshot helper
        run: |
          set -eo pipefail
          REPO="${GITHUB_REPOSITORY##*/}"
          echo "REPO=$REPO" >> "$GITHUB_ENV"

          # Identify what triggered the run.
          MODE=""
          REF=""
          case "${GITHUB_REF}" in
            refs/heads/main)
              if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
                MODE="full"
              else
                MODE="branch"
              fi
              REF="main"
              ;;
            refs/tags/*)
              MODE="tag"
              REF="${GITHUB_REF#refs/tags/}"
              ;;
            *)
              echo "unknown trigger ref: ${GITHUB_REF}" >&2
              exit 1
              ;;
          esac
          echo "MODE=$MODE" >> "$GITHUB_ENV"
          echo "REF=$REF"   >> "$GITHUB_ENV"
          echo "trigger: MODE=$MODE REF=$REF"

          # Write snapshot helper to /tmp so each subsequent step can
          # `source` it. Each step starts in a fresh shell, so a bash
          # function alone wouldn't survive across steps; the file does.
          cat > /tmp/_mirror_helper.sh <<'EOF'
          # _make_snapshot <ref-name>
          # Pre: working directory is a clone with the desired tree
          #      already checked out (HEAD → branch or tag).
          # Post: working directory is a fresh single-commit git repo
          #       on branch `main`, ready for tagging + force-push.
          _make_snapshot() {
            local ref_name="${1:?usage: _make_snapshot <ref-name>}"
            local canonical_sha
            canonical_sha="$(git rev-parse HEAD 2>/dev/null || echo unknown)"
            rm -rf .git
            find . -name '.git' -type d -prune -exec rm -rf {} + || true
            find . -name '.git' -type f -delete || true
            rm -f .gitmodules
            rm -rf .gitea/
            find . -name 'package-lock.json' -exec sed -i \
              -e 's|https://nexus\.goldix\.org/repository/npm-proxy/|https://registry.npmjs.org/|g' \
              -e 's|https://nexus\.goldix\.org/repository/npm-all/|https://registry.npmjs.org/|g' \
              {} + || true
            find . -name 'uv.lock' -exec sed -i \
              -e 's|https://nexus\.goldix\.org/repository/pypi-proxy/|https://pypi.org/|g' \
              -e 's|https://nexus\.goldix\.org/repository/pypi-all/|https://pypi.org/|g' \
              -e 's|https://nexus\.goldix\.org/repository/gx-pypi/|https://pypi.org/|g' \
              {} + || true
            git init -b main >/dev/null
            git config user.email "ci@dagstack.dev"
            git config user.name  "dagstack mirror"
            git add -A
            git commit -m "Snapshot of dagstack/${GITHUB_REPOSITORY##*/} at ${ref_name} (canonical ${canonical_sha}). Read-only mirror, see https://github.com/${GITHUB_REPOSITORY}" >/dev/null
            echo "snapshot built for ${ref_name} (canonical ${canonical_sha})"
          }
          EOF

      - name: Setup SSH key for github.com
        env:
          SSH_KEY: ${{ secrets.GH_MIRROR_TOKEN }}
        run: |
          set -eo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_github
          chmod 600 ~/.ssh/id_github
          ssh-keyscan -t rsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Mirror branch (push to main)
        if: env.MODE == 'branch'
        env:
          PAT: ${{ secrets.SUBMODULE_PAT }}
        run: |
          set -eo pipefail
          # shellcheck disable=SC1091
          source /tmp/_mirror_helper.sh
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_github -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
          export GIT_SSH_COMMAND

          # Shallow clone main only. We don't need tags here — branch
          # push only updates `main` on the mirror; tag refs stay put.
          git clone --depth 1 --branch main --recurse-submodules \
            "http://x-access-token:${PAT}@192.168.88.23:3222/dagstack/${REPO}.git" \
            snapshot

          ( cd snapshot && _make_snapshot "main" )

          git -C snapshot push --force \
            "git@github.com:dagstack/${REPO}.git" \
            main:main
          echo "main snapshot pushed to https://github.com/dagstack/${REPO}"

      - name: Mirror single tag (push tag)
        if: env.MODE == 'tag'
        env:
          PAT: ${{ secrets.SUBMODULE_PAT }}
        run: |
          set -eo pipefail
          # shellcheck disable=SC1091
          source /tmp/_mirror_helper.sh
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_github -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
          export GIT_SSH_COMMAND

          # Full clone (no --depth so we have all tag history available),
          # then explicitly checkout the triggering tag — ensures snapshot
          # reflects the tagged commit, not main.
          git clone --recurse-submodules \
            "http://x-access-token:${PAT}@192.168.88.23:3222/dagstack/${REPO}.git" \
            snapshot
          git -C snapshot checkout --recurse-submodules "refs/tags/${REF}"

          ( cd snapshot && _make_snapshot "${REF}" )
          git -C snapshot tag "${REF}"

          # Force-push only this tag (other tags on the mirror untouched).
          git -C snapshot push --force \
            "git@github.com:dagstack/${REPO}.git" \
            "refs/tags/${REF}:refs/tags/${REF}"
          echo "tag ${REF} mirrored to https://github.com/dagstack/${REPO}"

      - name: Full re-mirror (workflow_dispatch)
        if: env.MODE == 'full'
        env:
          PAT: ${{ secrets.SUBMODULE_PAT }}
        run: |
          set -eo pipefail
          # shellcheck disable=SC1091
          source /tmp/_mirror_helper.sh
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_github -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
          export GIT_SSH_COMMAND

          # Master clone — full history + all tags + submodules. Used as
          # source for per-ref local clones below (cheap via hardlinks).
          git clone --recurse-submodules \
            "http://x-access-token:${PAT}@192.168.88.23:3222/dagstack/${REPO}.git" \
            master

          # First push main snapshot.
          git clone --recurse-submodules master snapshot-main
          git -C snapshot-main checkout main
          ( cd snapshot-main && _make_snapshot "main" )
          git -C snapshot-main push --force \
            "git@github.com:dagstack/${REPO}.git" \
            main:main

          # Then mirror every semver tag, each as its own snapshot.
          # Patterns: parent `v*` and sub-module `*/v*`.
          tags=$(git -C master tag -l 'v*' '*/v*')
          for tag in $tags; do
            echo "=== mirror tag: $tag ==="
            workdir="snapshot-tag-$(echo "$tag" | tr / -)"
            git clone --recurse-submodules master "$workdir"
            git -C "$workdir" checkout --recurse-submodules "refs/tags/${tag}"
            ( cd "$workdir" && _make_snapshot "${tag}" )
            git -C "$workdir" tag "${tag}"
            git -C "$workdir" push --force \
              "git@github.com:dagstack/${REPO}.git" \
              "refs/tags/${tag}:refs/tags/${tag}"
          done
          echo "full re-mirror complete"
