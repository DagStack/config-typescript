# Cross-binding round-trip CI (issue #10).
#
# For each fixture in the matrix, runs all three bindings'
# canonical-JSON serialiser over the same input(s) and verifies that
# the bytes are identical. Catches drift that per-binding fixtures
# might miss (a binding can fail the same way as its expected file
# when the expected was generated by that binding).
#
# Workflow shape:
#   1. Single job; matrix over conformance fixtures. Each matrix entry
#      lists one or more `inputs/*.yaml` files; multi-file entries
#      exercise deep-merge semantics (ADR-0001 §3) end-to-end.
#   2. Job clones the spec itself (this repo) plus three sibling
#      bindings (`config-python`, `config-typescript`, `config-go`).
#   3. Sets up Python 3.12 + Node 20 + Go 1.22 (the dagstack-runner
#      Python image already ships Python and uv; Go and Node are
#      installed at job time — acceptable cost since the matrix is
#      small).
#   4. Runs each binding's wrapper (`scripts/canonical_*`) over the
#      fixture input(s) and writes its canonical bytes to a per-binding
#      file. Wrappers accept N file arguments and deep-merge them in
#      order (last wins) before canonicalising.
#   5. Diffs the three files. Any non-empty diff fails the job and
#      the diff appears in the log so the divergent rule is obvious.
#
# Trigger limitation (known): this workflow lives in `dagstack/config-spec`
# and triggers on changes to spec assets only. A canonical-JSON or
# deep-merge regression introduced in a binding's own repo
# (`dagstack/config-{python,typescript,go}`) is NOT caught here until
# the next spec PR re-runs the matrix. Mitigation paths:
#   (a) each binding repo runs its own canonical-JSON test suite
#       against the spec's expected bytes (already present);
#   (b) a nightly cron against `main` re-runs this workflow with the
#       latest binding tip — see the `schedule:` block below;
#   (c) a downstream binding PR can manually fire this workflow via
#       `workflow_dispatch` (Gitea UI / API) when its change touches
#       the canonical-JSON or merge surface.
# This is documented as the trade-off of the spec-side oracle pattern;
# moving the round-trip into each binding repo would duplicate setup
# 3x and lose the central comparison point.

name: Cross-binding round-trip

on:
  push:
    branches: [main]
    paths:
      - "_meta/**"
      - "conformance/**"
      - "scripts/**"
      - ".gitea/workflows/cross-binding-roundtrip.yml"
  pull_request:
    paths:
      - "_meta/**"
      - "conformance/**"
      - "scripts/**"
      - ".gitea/workflows/cross-binding-roundtrip.yml"
  schedule:
    # Nightly run picks up upstream binding drift — see "Trigger
    # limitation" note above. UTC; Gitea cron uses POSIX form.
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  roundtrip:
    name: ${{ matrix.fixture }} (${{ matrix.dir }})
    runs-on: dagstack-runner
    strategy:
      fail-fast: false
      matrix:
        # Each entry: dir (under conformance/) + fixture id + space-
        # separated input filenames (relative to conformance/<dir>/).
        # Single-input entries are the trivial round-trip case;
        # multi-input entries exercise deep-merge through each
        # binding's loader API (ADR-0001 §3 — maps merge recursively,
        # lists replace atomically).
        include:
          - dir: inputs
            fixture: basic_interpolation
            inputs: basic_interpolation.yaml
          - dir: inputs
            fixture: layered
            inputs: layered_base.yaml layered_override.yaml
          - dir: inputs
            fixture: interpolation_coerces_numeric
            inputs: interpolation_coerces_numeric.yaml
          - dir: inputs
            fixture: getter_raw_vs_section_view
            inputs: getter_raw_vs_section_view.yaml
          - dir: inputs
            fixture: whole_number_floats
            inputs: whole_number_floats.yaml
          - dir: inputs
            fixture: has_null
            inputs: has_null.yaml
          - dir: inputs
            fixture: ijson_safe_boundary
            inputs: ijson_safe_boundary.yaml
          - dir: inputs
            fixture: yaml_1_2_bool_literals
            inputs: yaml_1_2_bool_literals.yaml
    env:
      # Sibling checkouts of the three bindings live next to this repo.
      WORK: /tmp/cross-binding
      PAT: ${{ secrets.SUBMODULE_PAT }}
    steps:
      - name: Verify SUBMODULE_PAT secret is present
        run: |
          set -euo pipefail
          if [[ -z "${PAT:-}" ]]; then
              echo "::error::SUBMODULE_PAT secret is unset — cannot clone sibling bindings."
              exit 1
          fi

      - name: Clone spec (this repo, with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}
          path: spec

      - name: Clone sibling bindings
        run: |
          set -euo pipefail
          mkdir -p "$WORK"
          cd "$WORK"
          for repo in config-python config-typescript config-go; do
              git clone --depth 1 \
                  "http://x-access-token:${PAT}@192.168.88.23:3222/dagstack/${repo}.git" \
                  "$repo"
          done

      - name: Setup Python (uv) + Node + Go
        run: |
          set -euo pipefail
          # uv already in dagstack-runner image; install deps for the spec
          # wrapper and the binding under test.
          cd "$WORK/config-python"
          uv sync --no-dev
          # Node — the dagstack-runner base image (runner-images:
          # ubuntu-latest) ships Node 24+ in /opt/acttoolcache and adds
          # it to PATH. `which node` is the cheap precondition check.
          which node
          node --version
          # Go — the Python-flavoured runner does not bundle Go, and the
          # Ubuntu repository it uses (`ubuntu-latest`) does not expose
          # `golang-go` either. Install from the official tarball at
          # `go.dev/dl/`. Pinned to a 1.22.x patch — the wrapper's go.mod
          # declares `go 1.22`, and we keep the spec workflow on the same
          # minor so the toolchain matches what dagstack-runner-go uses
          # for the binding itself (config-go CI runs Go 1.22 / 1.23 /
          # 1.24 matrix). Bump in lockstep with config-go's image refresh.
          GO_VERSION=1.22.12
          GO_TARBALL="go${GO_VERSION}.linux-amd64.tar.gz"
          curl -fsSL -o "/tmp/${GO_TARBALL}" \
              "https://go.dev/dl/${GO_TARBALL}"
          tar -C /opt -xzf "/tmp/${GO_TARBALL}"
          mv /opt/go "/opt/go-${GO_VERSION}"
          ln -sfn "/opt/go-${GO_VERSION}/bin/go" /usr/local/bin/go
          go version

      - name: Build TypeScript binding + install wrapper deps
        run: |
          set -euo pipefail
          cd "$WORK/config-typescript"
          npm install
          npm run build
          # Wire @dagstack/config into the wrapper via a file: install.
          # `npm link` proved unreliable here — its global-symlink dance
          # raced with `npm install --save-dev` (subsequent installs
          # silently dropped the link, npx then re-fetched a fresh tsx
          # and failed to resolve @dagstack/config). `file:` install is
          # idempotent: npm copies the package into node_modules in one
          # shot, so devDeps + dagstack land together.
          mkdir -p "$GITHUB_WORKSPACE/spec/scripts"
          cd "$GITHUB_WORKSPACE/spec/scripts"
          # Bootstrap a private package.json (kept out of git via
          # scripts/.gitignore) so npm has a project root to install into.
          if [[ ! -f package.json ]]; then
              cat > package.json <<'EOF'
          {
            "name": "_canonical_typescript_wrapper",
            "private": true,
            "type": "module"
          }
          EOF
          fi
          npm install --save-dev tsx yaml "file:$WORK/config-typescript"

      - name: Point Go wrapper at sibling config-go checkout
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/spec/scripts/canonical_go"
          # The wrapper's go.mod ships with a `replace` directive
          # pointing at `../../../dagstack-config-go` (the sibling-of-
          # spec layout used in local development). CI clones the
          # binding into `$WORK/config-go`, which lives elsewhere — so
          # rewrite the replace target before invoking `go run`.
          # `go mod edit -replace` handles the path-only override
          # idempotently. After the rewrite `go mod tidy` populates
          # go.sum from the proxy (yaml.v3 only).
          go mod edit -replace "go.dagstack.dev/config=$WORK/config-go"
          go mod tidy

      - name: Run all three wrappers and diff
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/spec"
          # Build the absolute fixture-path list once — wrappers accept
          # N positional arguments and deep-merge them in order.
          DIR="${{ matrix.dir }}"
          FIXTURES=""
          for f in ${{ matrix.inputs }}; do
              FIXTURES="$FIXTURES conformance/$DIR/$f"
          done
          # Trim leading whitespace (cosmetic, makes the echo readable).
          FIXTURES="${FIXTURES# }"
          echo "── Inputs (${{ matrix.fixture }}): $FIXTURES ──"
          mkdir -p /tmp/round
          # shellcheck disable=SC2086 — word-splitting is intentional
          # so each fixture path becomes a separate argv entry.
          PYTHONPATH="$WORK/config-python/src" \
              uv --project "$WORK/config-python" run python3 \
                  scripts/canonical_python.py $FIXTURES \
              > /tmp/round/python.json
          npx tsx scripts/canonical_typescript.ts $FIXTURES \
              > /tmp/round/typescript.json
          # Go wrapper: `go run` from the wrapper module dir so the
          # local `replace` directive (pointing at $WORK/config-go) is
          # honoured. Pass absolute fixture paths so cwd is irrelevant.
          ABS_FIXTURES=""
          for f in $FIXTURES; do
              ABS_FIXTURES="$ABS_FIXTURES $GITHUB_WORKSPACE/spec/$f"
          done
          ABS_FIXTURES="${ABS_FIXTURES# }"
          (
              cd scripts/canonical_go
              # shellcheck disable=SC2086
              go run . $ABS_FIXTURES
          ) > /tmp/round/go.json

          echo "── Round-trip diff (${{ matrix.fixture }}) ──"
          if ! diff -u /tmp/round/python.json /tmp/round/typescript.json; then
              echo "::error::Python ↔ TypeScript canonical bytes differ"
              exit 1
          fi
          if ! diff -u /tmp/round/python.json /tmp/round/go.json; then
              echo "::error::Python ↔ Go canonical bytes differ"
              exit 1
          fi
          echo "All three bindings agree on ${{ matrix.fixture }}."
