# Secret suffix patterns — source of truth for masking values in
# diagnostic messages (§6 Secrets handling + §4.5 error masking).
#
# On a conflict with the prose in the ADR this file wins.
#
# Bindings MUST mask **values** of fields whose names (case-insensitive)
# end with one of the suffixes listed below in:
#   - ConfigError.details on validation_failed / type_mismatch /
#     env_unresolved errors;
#   - snapshot() output (if the binding exposes one);
#   - source_ids() output (if an id contains a sensitive part — rare but
#     possible in theory for an HTTP source with a token in the URL).
#
# Mask format: the value is replaced with "[MASKED]" in its string
# representation. The key (field name) stays unchanged — otherwise the
# diagnostic context is lost.

version: "1.0"

# Suffix match (case-insensitive). Applied to the schema field name.
suffixes:
  - _key
  - _secret
  - _token
  - _password
  - _passphrase
  - _credentials
  - _credential
  - _auth
  - _api_key
  - _access_key
  - _private_key

# Prefix match (case-insensitive). A more lenient check — for fields
# such as "api_key" at the top level (not matched by a suffix).
prefixes:
  - api_key
  - api_token
  - secret
  - password
  - private_key
  - access_token
  - bearer

# Exact match (case-insensitive). The field name equals exactly one of
# the entries.
exact:
  - api_key
  - apikey
  - password
  - passwd
  - pw
  - token
  - secret
  - credentials

# The placeholder that replaces a sensitive value in output.
masked_placeholder: "[MASKED]"

# Additional guidance for bindings:
#
# 1. The mask is applied to the **string representation** of the value,
#    not to the operating logic. In ConfigError.details, when the cause
#    is validation on the field `password` with the value "", the
#    binding writes "Password '[MASKED]' does not match required pattern",
#    not "Password '' does not match required pattern". This prevents
#    secrets from leaking into log files.
#
# 2. If the value is empty / null / absent, the mask is not applied
#    (there is nothing to hide; "[MASKED]" instead of null would be
#    misleading).
#
# 3. snapshot() MUST mask by default. The binding may offer
#    `snapshot(include_secrets=True)` as an opt-in for audit scenarios,
#    but the default must stay safe.
