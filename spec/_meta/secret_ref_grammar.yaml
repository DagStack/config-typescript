# Source of truth for the `${secret:<scheme>:<path>[?query][#field][:-default]}`
# reference grammar (per ADR-0002 §1).
#
# Bindings MUST parse references against the EBNF below. The regex
# fragments per binding are conveniences — they MUST NOT relax the EBNF
# (for example, a regex MUST NOT accept an upper-case scheme even
# though POSIX character classes would allow it).
#
# Adding a new query parameter (Phase 2 has only `version`, Vault-only):
# append to `query_parameters`. Bindings MUST reject unknown query keys
# with `secret_unresolved` — silent ignore would let typos slip through
# at deploy time and surface as "value is None" much later.
#
# Escape rules — required (per ADR-0002 v1.1 §1):
#   - literal "#" inside path is "##"
#   - literal "?" inside path is "??"
#   - literal ":-" inside path is "::-"
#   - literal "&", "=", "}", "#" inside query_value are %-encoded (RFC 3986)
#
# Token order is fixed: `path → ?query → #field → :-default → }`.

version: "1.0"

# EBNF reference (informative — kept in sync with ADR-0002 §1).
ebnf: |
  secret_ref     := "${" "secret" ":" scheme ":" path_with_query [field_proj] [":-" default] "}"
  scheme         := [a-z][a-z0-9_]*
  path_with_query:= path ["?" query]
  path           := <any chars except "}", "#"; literal "?" is "??", literal "#" is "##", ":-" is "::-">
  query          := query_kv ("&" query_kv)*
  query_kv       := query_key "=" query_value
  query_key      := [a-z][a-z0-9_]*
  query_value    := <percent-encoded per RFC 3986; literal "&", "=", "}", "#" MUST be %-encoded>
  field_proj     := "#" field
  field          := <any chars except "}">
  default        := <any chars except "}">

# Per-binding regex fragment for the outer `${secret:...}` shell.
# Bindings MUST use this exact pattern (or a strictly equivalent one)
# for the initial match, then parse the inner structure with a
# language-native parser per the EBNF.
#
# The pattern intentionally captures the WHOLE inner string (group 1)
# so the inner parser sees scheme:path:query:field:default in one
# pass — that simplifies the escape-handling logic.
regex_outer:
  python:     '\$\{secret:([^}]*)\}'
  typescript: '\$\{secret:([^}]*)\}'
  go:         '\$\{secret:([^}]*)\}'

# Phase 2 normative query parameters. Adapters MAY accept additional
# (vendor-specific) keys; bindings MUST reject unknown keys for adapters
# that do not consume them.
query_parameters:
  - key: version
    type: integer-string
    used_by: [vault]
    description: |
      Read a specific KV v2 version. If the requested version is
      destroyed or deleted, the adapter raises secret_unresolved.
      Default (no `?version=`): latest version. Cache key includes the
      requested version so different versions are cached independently.
