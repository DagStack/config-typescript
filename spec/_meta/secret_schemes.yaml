# Source of truth for the SecretSource scheme registry (per ADR-0002 §1
# and §8). Each entry maps a `${secret:<scheme>:...}` token to the
# adapter type that provides it.
#
# Bindings MUST honour these schemes by their `scheme` value (left-most
# column of a ${secret:...} token after `secret:`). The `adapter` field
# names the canonical implementation type per binding (Python class /
# TypeScript class / Go struct), with stutter avoidance applied at the
# binding level.
#
# `mandatory: true` means the binding's loader MUST auto-register an
# instance if the consumer does not pass one — currently only `env`.
#
# `phase` indicates when the adapter ships normatively:
#   - 2: ships in the same release that lands ADR-0002 (env, vault).
#   - 3: deferred until ADR-0003 is fixed (cloud secret managers).
#
# `kind` is informational:
#   - in-process: no out-of-process round-trip (env vars).
#   - remote:     HTTP / gRPC to a service.
#   - in-cluster: requires Kubernetes API access.
#
# `docs` is an optional URL to operator-facing documentation. May be
# omitted in early drafts; populated as docs sites land.
#
# Operator-extensible scheme space: schemes not listed here are NOT
# reserved by the spec. An operator MAY register a SecretSource with
# any lowercase identifier (matching the §1 `scheme` grammar) — for
# example, two Vault clusters as `vault` and `vault-dr`. The registry
# below documents the schemes the spec itself names.

version: "1.0"
schemes:
  - scheme: env
    adapter: EnvSecretSource
    mandatory: true
    phase: 2
    kind: in-process
  - scheme: vault
    adapter: VaultSource
    mandatory: false
    phase: 2
    kind: remote
  - scheme: awssm
    adapter: AwsSecretsManagerSource
    mandatory: false
    phase: 3
    kind: remote
  - scheme: gcpsm
    adapter: GcpSecretManagerSource
    mandatory: false
    phase: 3
    kind: remote
  - scheme: k8ssecret
    adapter: K8sSecretSource
    mandatory: false
    phase: 3
    kind: in-cluster
